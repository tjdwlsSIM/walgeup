<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 월급노트 로고: 남색 바탕 + 노트 한 장 + 원화(₩) + 붉은 도장 -->
  <rect width="64" height="64" rx="14" fill="#2C4A73"/>
  <!-- 노트 페이지 (접힌 귀퉁이) -->
  <path d="M14 10 h28 l8 8 v36 a3 3 0 0 1 -3 3 h-33 a3 3 0 0 1 -3 -3 v-41 a3 3 0 0 1 3 -3 z" fill="#FDFDFB"/>
  <path d="M42 10 v8 h8 z" fill="#D8DEE7"/>
  <!-- ₩ 심볼 (선으로 직접 그림) -->
  <path d="M21 23 L26.5 40 L32 27 L37.5 40 L43 23" fill="none" stroke="#2C4A73" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="19" y1="29" x2="45" y2="29" stroke="#2C4A73" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="19" y1="33.5" x2="45" y2="33.5" stroke="#2C4A73" stroke-width="2.4" stroke-linecap="round"/>
  <!-- 노트 괘선 -->
  <line x1="18" y1="47" x2="38" y2="47" stroke="#D8DEE7" stroke-width="2" stroke-linecap="round"/>
  <!-- 붉은 확인 도장 -->
  <circle cx="44" cy="48" r="6.5" fill="rgba(190,59,47,.08)" stroke="#BE3B2F" stroke-width="2.4" transform="rotate(-8 44 48)"/>
</svg>
